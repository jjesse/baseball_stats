<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Live MLB standings with division rankings, sortable records, and team links by season.">
    <meta property="og:title" content="MLB Standings">
    <meta property="og:description" content="Track MLB standings, division races, and records by season.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jjesse.github.io/baseball_stats/index.html">
    <link rel="canonical" href="https://jjesse.github.io/baseball_stats/index.html">
    <title>MLB Standings</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="nav-links">
                <a href="index.html">Team Standings</a> |
                <a href="batting.html">Batting Stats</a> |
                <a href="pitching.html">Pitching Stats</a> |
                <a href="scoreboard.html">Scoreboard</a> |
                <a href="compare.html">Compare Players</a> |
                <a href="archives/2025/index.html">2025 Season Archive</a>
            </div>
            <h1 id="page-title">MLB Standings</h1>
            <div class="header-controls">
                <form class="search-bar-nav" action="search.html" method="get" role="search">
                    <input type="text" name="q" placeholder="Search teams or players…" aria-label="Search teams or players">
                    <button type="submit" aria-label="Search">🔍</button>
                </form>
                <button type="button" id="darkModeToggle">🌙 Dark Mode</button>
            </div>
        </div>
        <div class="season-banner season-picker">
            <label for="season-select">Season:</label>
            <select id="season-select" aria-label="Select standings season"></select>
        </div>
        <div id="favorites-section" class="favorites-section"></div>
        <div id="standings" aria-live="polite">
            <div class="loading-indicator" role="status" aria-live="polite"><span class="loading-spinner" aria-hidden="true"></span><span>Loading standings…</span></div>
        </div>
        <div class="footer" id="footer"></div>
    </div>
    <script src="assets/shared.js"></script>
    <script src="assets/app.js"></script>
</body>
</html>
