<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Team Page</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="nav-links">
                <a href="index.html">Team Standings</a> |
                <a href="batting.html">Batting Stats</a> |
                <a href="pitching.html">Pitching Stats</a> |
                <a href="scoreboard.html">Scoreboard</a> |
                <a href="archives/2025/index.html">2025 Season Archive</a>
            </div>
            <h1 id="team-name">Team</h1>
            <div class="header-controls">
                <form class="search-bar-nav" action="search.html" method="get" role="search">
                    <input type="text" name="q" placeholder="Search teams or players…" aria-label="Search teams or players">
                    <button type="submit" aria-label="Search">🔍</button>
                </form>
                <button type="button" id="darkModeToggle">🌙 Dark Mode</button>
            </div>
        </div>
        <div id="team-info"></div>
        <h2 id="schedule-heading">Schedule &amp; Recent Results</h2>
        <div id="team-schedule"><p>Loading schedule...</p></div>
        <h2 id="roster-heading">Roster</h2>
        <div id="team-roster"><p>Loading roster...</p></div>
        <div class="footer" id="footer"></div>
    </div>
    <script src="assets/shared.js"></script>
    <script src="assets/team.js"></script>
</body>
</html>
