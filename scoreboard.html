<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Daily MLB scoreboard with live game states, final scores, and team links.">
    <meta property="og:title" content="MLB Scoreboard">
    <meta property="og:description" content="See today's MLB games, live scores, and final results.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jjesse.github.io/baseball_stats/scoreboard.html">
    <link rel="canonical" href="https://jjesse.github.io/baseball_stats/scoreboard.html">
    <title>MLB Scoreboard</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="nav-links">
                <a href="index.html">Team Standings</a> |
                <a href="batting.html">Batting Stats</a> |
                <a href="pitching.html">Pitching Stats</a> |
                <a href="scoreboard.html">Scoreboard</a> |
                <a href="compare.html">Compare Players</a> |
                <a href="archives/2025/index.html">2025 Season Archive</a>
            </div>
            <h1 id="page-title">MLB Scoreboard</h1>
            <div class="header-controls">
                <form class="search-bar-nav" action="search.html" method="get" role="search">
                    <input type="text" name="q" placeholder="Search teams or players…" aria-label="Search teams or players">
                    <button type="submit" aria-label="Search">🔍</button>
                </form>
                <button type="button" id="darkModeToggle">🌙 Dark Mode</button>
            </div>
        </div>
        <div id="date-selector" class="date-selector">
            <button type="button" id="prev-day" aria-label="Previous day">&#8592; Prev</button>
            <span id="selected-date"></span>
            <button type="button" id="next-day" aria-label="Next day">Next &#8594;</button>
        </div>
        <div id="scoreboard" aria-live="polite"><div class="loading-indicator" role="status" aria-live="polite"><span class="loading-spinner" aria-hidden="true"></span><span>Loading games…</span></div></div>
        <div class="footer" id="footer"></div>
    </div>
    <script src="assets/shared.js"></script>
    <script src="assets/scoreboard.js"></script>
</body>
</html>
