<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MLB player profiles with bio, career stats, season stats, and splits.">
    <meta property="og:title" content="MLB Player Profile">
    <meta property="og:description" content="View MLB player bio, season performance, career stats, and splits.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://jjesse.github.io/baseball_stats/player.html">
    <title>MLB Player Profile</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="nav-links">
                <a href="index.html">Team Standings</a> |
                <a href="batting.html">Batting Stats</a> |
                <a href="pitching.html">Pitching Stats</a> |
                <a href="scoreboard.html">Scoreboard</a> |
                <a href="archives/2025/index.html">2025 Season Archive</a>
            </div>
            <h1 id="player-name">Player Profile</h1>
            <div class="header-controls">
                <form class="search-bar-nav" action="search.html" method="get" role="search">
                    <input type="text" name="q" placeholder="Search teams or players…" aria-label="Search teams or players">
                    <button type="submit" aria-label="Search">🔍</button>
                </form>
                <button type="button" id="darkModeToggle">🌙 Dark Mode</button>
            </div>
        </div>
        <div id="player-info"><div class="loading-indicator" role="status" aria-live="polite"><span class="loading-spinner" aria-hidden="true"></span><span>Loading player info…</span></div></div>
        <div id="player-stats">
            <div class="tabs">
                <button type="button" class="tab-btn active" data-tab="career">Career Stats</button>
                <button type="button" class="tab-btn" data-tab="season">Season Stats</button>
                <button type="button" class="tab-btn" data-tab="splits">Splits</button>
            </div>
            <div id="player-career" class="tab-content active"><div class="loading-indicator" role="status" aria-live="polite"><span class="loading-spinner" aria-hidden="true"></span><span>Loading career stats…</span></div></div>
            <div id="player-season" class="tab-content"><div class="loading-indicator" role="status" aria-live="polite"><span class="loading-spinner" aria-hidden="true"></span><span>Loading season stats…</span></div></div>
            <div id="player-splits" class="tab-content"><div class="loading-indicator" role="status" aria-live="polite"><span class="loading-spinner" aria-hidden="true"></span><span>Loading splits…</span></div></div>
        </div>
        <div class="footer" id="footer"></div>
    </div>
    <script src="assets/shared.js"></script>
    <script src="assets/player.js"></script>
</body>
</html>
