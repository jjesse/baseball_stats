<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Search MLB teams and players with quick links to team and player pages.">
    <meta property="og:title" content="MLB Search">
    <meta property="og:description" content="Find MLB teams and players by name.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jjesse.github.io/baseball_stats/search.html">
    <link rel="canonical" href="https://jjesse.github.io/baseball_stats/search.html">
    <title>MLB Search</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <div class="container">
        <div class="header-row">
            <div class="nav-links">
                <a href="index.html">Team Standings</a> |
                <a href="batting.html">Batting Stats</a> |
                <a href="pitching.html">Pitching Stats</a> |
                <a href="scoreboard.html">Scoreboard</a> |
                <a href="archives/2025/index.html">2025 Season Archive</a>
            </div>
            <h1 id="page-title">MLB Search</h1>
            <div class="header-controls">
                <form class="search-bar-nav" action="search.html" method="get" role="search">
                    <input type="text" name="q" placeholder="Search teams or players…" aria-label="Search teams or players">
                    <button type="submit" aria-label="Search">🔍</button>
                </form>
                <button type="button" id="darkModeToggle">🌙 Dark Mode</button>
            </div>
        </div>
        <div class="search-bar-large">
            <input type="text" id="search-input" placeholder="Search teams or players…" aria-label="Search teams or players" autocomplete="off">
            <button type="button" id="search-btn">Search</button>
        </div>
        <div id="search-results" aria-live="polite"></div>
        <div class="footer" id="footer"></div>
    </div>
    <script src="assets/shared.js"></script>
    <script src="assets/search.js"></script>
</body>
</html>
